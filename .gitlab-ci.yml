stages:
  - setup
  - validate
  - build
  - healthcheck
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .npm/
    - .cache/pip/

node_setup:
  stage: setup
  image: node:20
  script:
    - npm ci --cache .npm --prefer-offline

backend_setup:
  stage: setup
  image: python:3.10
  script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt

typecheck:
  stage: validate
  image: node:20
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run typecheck

backend_compile:
  stage: validate
  image: python:3.10
  script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - cd backend
    - python -m compileall app

# No automated test script exists yet.
# Add a test job later after adding scripts such as:
# - npm test --workspaces --if-present
# - cd backend && pytest

frontend_build:
  stage: build
  image: node:20
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week

api_healthcheck:
  stage: healthcheck
  image: python:3.10
  script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - cd backend
    - python -m uvicorn app.main:app --host 0.0.0.0 --port 4010 &
    - sleep 8
    - python -c "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:4010/api/health')); assert data['status'] == 'ok'; print(data)"

deploy_placeholder:
  stage: deploy
  image: alpine:3.20
  script:
    - echo "Deploy placeholder: connect this job to Vercel, Render, Railway, or EAS Build later."
  when: manual
  allow_failure: true
